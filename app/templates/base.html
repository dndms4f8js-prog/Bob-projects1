<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}IT学習記録{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { padding-top: 90px; }
    .app-navbar {
      background-color: #2251e3;
      min-height: 90px;
    }
    .navbar-brand {
      font-size: 1.35rem;
      font-weight: 400;
      color: #ffffff !important;
      letter-spacing: 0.02em;
    }
    .navbar-brand:hover { color: #e8eeff !important; }
    .nav-link { color: rgba(255,255,255,0.85) !important; }
    .nav-link:hover { color: #ffffff !important; }
    .navbar-toggler { border-color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg app-navbar fixed-top">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('records.index') }}">Knowledge Ledger</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('records.index') }}">一覧</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('records.new_record') }}">新規登録</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('quiz.setup') }}">クイズ</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('admin.index') }}">管理</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  {% block scripts %}{% endblock %}
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
