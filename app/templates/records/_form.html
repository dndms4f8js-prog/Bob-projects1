<!-- 登録・編集フォーム共通パーツ -->
<div class="mb-3">
  <label class="form-label fw-bold">用語名 <span class="text-danger">*</span></label>
  <input type="text" class="form-control" name="term"
         value="{{ record.term if record is defined else '' }}" required>
</div>

<div class="mb-3">
  <label class="form-label fw-bold">正式名称（略語の場合）</label>
  <input type="text" class="form-control" name="full_name"
         value="{{ record.full_name if record is defined and record.full_name else '' }}">
</div>

<div class="mb-3">
  <label class="form-label fw-bold">カテゴリ <span class="text-danger">*</span></label>
  <select class="form-select" name="category" required>
    <option value="">選択してください</option>
    {% for cat in categories %}
      <option value="{{ cat }}"
        {% if record is defined and record.category == cat %}selected{% endif %}>
        {{ cat }}
      </option>
    {% endfor %}
  </select>
</div>

<div class="mb-3">
  <label class="form-label fw-bold">説明文 <span class="text-danger">*</span>
    <small class="text-muted fw-normal">（Markdown対応）</small>
  </label>
  <textarea class="form-control" name="description" rows="6" required>{{ record.description if record is defined else '' }}</textarea>
</div>

<div class="mb-3">
  <label class="form-label fw-bold">例文</label>
  <textarea class="form-control" name="example" rows="3">{{ record.example if record is defined and record.example else '' }}</textarea>
</div>

<div class="mb-3">
  <label class="form-label fw-bold">関連キーワード</label>
  <input type="text" class="form-control" name="keywords"
         placeholder="カンマ区切りで入力（例：クラウド, 仮想化）"
         value="{{ record.keywords if record is defined and record.keywords else '' }}">
</div>

<div class="mb-3">
  <label class="form-label fw-bold">理解度</label>
  <select class="form-select" name="understanding" style="max-width: 200px;">
    {% for i in range(1, 6) %}
      <option value="{{ i }}"
        {% if record is defined and record.understanding == i %}selected
        {% elif record is not defined and i == 3 %}selected
        {% endif %}>
        {{ i }} / 5
      </option>
    {% endfor %}
  </select>
</div>

<div class="row g-2">
  <div class="col-auto">
    <label class="form-label fw-bold">登録年月 <span class="text-danger">*</span></label>
    <div class="d-flex gap-2">
      <select class="form-select" name="registered_year" required style="width: 120px;">
        {% for y in years %}
          <option value="{{ y }}"
            {% if record is defined and record.registered_year == y %}selected
            {% elif record is not defined and y == now_year %}selected
            {% endif %}>
            {{ y }}年
          </option>
        {% endfor %}
      </select>
      <select class="form-select" name="registered_month" required style="width: 100px;">
        {% for m in range(1, 13) %}
          <option value="{{ m }}"
            {% if record is defined and record.registered_month == m %}selected
            {% elif record is not defined and m == now_month %}selected
            {% endif %}>
            {{ m }}月
          </option>
        {% endfor %}
      </select>
    </div>
  </div>
</div>
