{% extends "base.html" %}
{% block title %}クイズ設定 - IT学習記録{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h1 class="h3 mb-4 text-center">クイズ設定</h1>

    {% if total < 4 %}
      <div class="alert alert-warning">
        クイズを開始するには最低4件の学習記録が必要です。
        現在 <strong>{{ total }}件</strong> 登録されています。
        <a href="{{ url_for('records.new_record') }}">記録を追加する</a>
      </div>
    {% else %}
      <div class="card">
        <div class="card-body">
          <p class="text-muted text-center mb-4">全 <strong>{{ total }}件</strong> の記録から出題します。</p>
          <form method="post" action="{{ url_for('quiz.start') }}">

            <!-- 出題形式 -->
            <div class="mb-4">
              <label class="form-label fw-bold">出題形式</label>
              <div class="list-group">
                <label class="list-group-item list-group-item-action">
                  <input type="radio" name="mode" value="term" class="form-check-input me-2" checked>
                  <strong>用語名を選ぶ</strong>
                  <small class="d-block text-muted">説明文を読んで、正しい用語名を選択します</small>
                </label>
                <label class="list-group-item list-group-item-action">
                  <input type="radio" name="mode" value="desc" class="form-check-input me-2">
                  <strong>説明文を選ぶ</strong>
                  <small class="d-block text-muted">用語名を見て、正しい説明文を選択します</small>
                </label>
              </div>
            </div>

            <!-- 理解度フィルター -->
            <div class="mb-4">
              <label class="form-label fw-bold">出題範囲（理解度フィルター）</label>
              <div class="list-group">
                <label class="list-group-item list-group-item-action">
                  <input type="radio" name="understanding_filter" value="all" class="form-check-input me-2" checked>
                  <strong>すべて</strong>
                  <span class="badge bg-secondary ms-2">{{ total }}件</span>
                </label>
                <label class="list-group-item list-group-item-action">
                  <input type="radio" name="understanding_filter" value="weak" class="form-check-input me-2"
                    {% set weak_count = (understanding_counts[1]|default(0)) + (understanding_counts[2]|default(0)) + (understanding_counts[3]|default(0)) %}
                    {% if weak_count < 4 %}disabled{% endif %}>
                  <strong>苦手優先</strong>（理解度1〜3）
                  <span class="badge bg-warning text-dark ms-2">
                    {{ (understanding_counts[1]|default(0)) + (understanding_counts[2]|default(0)) + (understanding_counts[3]|default(0)) }}件
                  </span>
                  {% set weak_count = (understanding_counts[1]|default(0)) + (understanding_counts[2]|default(0)) + (understanding_counts[3]|default(0)) %}
                  {% if weak_count < 4 %}
                    <small class="text-muted d-block">4件未満のため選択不可</small>
                  {% endif %}
                </label>
                <label class="list-group-item list-group-item-action">
                  <input type="radio" name="understanding_filter" value="strong" class="form-check-input me-2"
                    {% set strong_count = (understanding_counts[4]|default(0)) + (understanding_counts[5]|default(0)) %}
                    {% if strong_count < 4 %}disabled{% endif %}>
                  <strong>得意のみ</strong>（理解度4〜5）
                  <span class="badge bg-success ms-2">
                    {{ (understanding_counts[4]|default(0)) + (understanding_counts[5]|default(0)) }}件
                  </span>
                  {% set strong_count = (understanding_counts[4]|default(0)) + (understanding_counts[5]|default(0)) %}
                  {% if strong_count < 4 %}
                    <small class="text-muted d-block">4件未満のため選択不可</small>
                  {% endif %}
                </label>
              </div>
            </div>

            <!-- 出題数 -->
            <div class="mb-4">
              <label class="form-label fw-bold">出題数</label>
              <div class="d-flex gap-3">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="count" value="10" id="count10" checked>
                  <label class="form-check-label" for="count10">10問</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="count" value="30" id="count30"
                    {% if total < 30 %}disabled{% endif %}>
                  <label class="form-check-label" for="count30">
                    30問 {% if total < 30 %}<span class="text-muted small">（記録が{{ total }}件のため選択不可）</span>{% endif %}
                  </label>
                </div>
              </div>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg">クイズを開始する</button>
            </div>
          </form>
        </div>
      </div>
    {% endif %}
  </div>
</div>
{% endblock %}
